<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Login</title>
	<link rel="stylesheet" href="styles/style.css" />
</head>
<body>
	<main class="mainCard">
		<header>
			<h1>Login</h1>
		</header>
		<section>
			<form class="form" id="loginForm">
				<div class="loginRow">
					<label for="username">Benutzername</label>
					<input id="username" name="username" type="text" placeholder="Username" />
				</div>
				<div class="loginRow">
					<label for="password">Passwort</label>
					<input id="password" name="password" type="password" placeholder="Password" />
				</div>
				<div class="error" id="errorMessage"></div>
				<button type="submit">CV Anschauen</button>
			</form>
		</section>
	</main>
	<script>
		const form = document.getElementById('loginForm');
		const errorMessage = document.getElementById('errorMessage');
		const usernameInput = document.getElementById('username');
		const passwordInput = document.getElementById('password');

		form.addEventListener('submit', function (event) {
			event.preventDefault();

			const username = usernameInput.value.trim();
			const password = passwordInput.value.trim();

			if (username === 'zukuenftigerArbeitsgeber' && password === 'Extr3m$ich3r3$P@ssw0rtFuerD@sCVv0nN0@G@sch3') {
				sessionStorage.setItem('loginSuccess', 'true');
				window.location.href = 'pages/cv.html';
			} else {
				errorMessage.textContent = 'Die eingegebenen Anmeldedaten sind ungültig. Bitte versuchen Sie es erneut.';
				passwordInput.value = '';
				passwordInput.focus();
			}
		});
	</script>
</body>
</html>
