<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Memory Game</title>
	<link rel="stylesheet" href="../styles/style.css" />
	<script src="../scripts/game.js" defer></script>
</head>
<body>
	<main class="mainCard">
		<header>
			<h1>Memory Game</h1>
			<p class="gameP">Willkommen zum Memory Game!<br>Hier können Sie Ihr Gedächtnis testen.</p>
			<div>Highscore: <span id="highscore">0</span></div>
		</header>
		<section>
			<div id="infofield">
				<div id="clickToPlay">
					<p class="gameP">Klicken Sie hier um das Spiel zu starten!</p>
				</div>
				<div id="messageDiv"></div>
				<div id="colorDiv"></div>
				<div id="finalDiv">
					<div id="finalTextDiv"></div>
					<div id="restartDiv">
						<img src="../images/rotateLeft.svg" alt="Restart Icon" width="20" height="20" />
						Erneut versuchen
					</div>
				</div>
				<div id="gamefield" style="display: none;">
					<button id="btnRed" class="button"></button>
					<button id="btnGreen" class="button"></button>
					<button id="btnYellow" class="button"></button>
					<button id="btnBlue" class="button"></button>
				</div>
			</div>
		</section>
	</main>
	<footer>
		<p class="gameP">
			<a href="cv.html" onclick="sessionStorage.setItem('fromGame', 'true')">Zurück zum Lebenslauf</a>
		</p>
	</footer>
</body>
</html>
