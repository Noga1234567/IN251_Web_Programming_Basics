<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Login</title>
	<style>
		* {
			box-sizing: border-box;
		}

		:root {
			--text: #e2e8f0;
		}

		html,
		body {
			min-height: 100%;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 16px;
			font-family: Arial, Helvetica, sans-serif;
			color: var(--text);
			background:
				linear-gradient(160deg, #020617, #0f172a 55%, #111827);
		}

		#main {
			width: min(100%, 460px);
			padding: 14px;
			border: 1px solid #94a3b833;
			border-radius: 28px;
			background: #ffffff17;
			backdrop-filter: blur(14px);
			box-shadow: 0 24px 80px #02061773;
		}

		.login-card {
			display: grid;
			gap: 18px;
			padding: 20px;
			border-radius: 22px;
			background: #ffffff0d;
			border: 1px solid #ffffff12;
		}

		h1 {
			margin: 0;
			font-size: clamp(2rem, 8vw, 3.2rem);
			line-height: 0.95;
			text-transform: uppercase;
		}

		.form {
			display: grid;
			gap: 14px;
		}

		.row {
			display: grid;
			gap: 8px;
		}

		label {
			font-size: 1rem;
			color: #e5eef9;
		}

		input {
			width: 100%;
			padding: 14px 16px;
			border-radius: 14px;
			border: 1px solid #ffffff1f;
			background: #02061766;
			color: var(--text);
			font-size: 1rem;
			outline: none;
		}

		input:focus {
			border-color: #7dd3fc;
			box-shadow: 0 0 0 4px #7dd3fc1f;
		}

		button {
			padding: 14px 16px;
			border: 0;
			border-radius: 14px;
			font-size: 1rem;
			font-weight: 700;
			color: #08111f;
			background: linear-gradient(90deg, #7dd3fc, #a78bfa);
			cursor: pointer;
		}

		button:hover {
			filter: brightness(1.1);
		}

		.error {
			font-size: 1rem;
			color: #fca5a5;
		}

		@media (min-width: 735px) {
			#main {
				width: min(100%, 500px);
				padding: 18px;
			}

			.login-card {
				padding: 26px;
				gap: 20px;
			}
		}
	</style>
</head>
<body>
	<main id="main">
		<section class="login-card">
            <h1>Login</h1>

			<form class="form" id="loginForm">
				<div class="row">
					<label for="username">Benutzername</label>
					<input id="username" name="username" type="text" placeholder="Username" />
				</div>
				<div class="row">
					<label for="password">Passwort</label>
					<input id="password" name="password" type="password" placeholder="Password" />
				</div>
				<button type="submit">CV Anschauen</button>
				<div class="error" id="errorMessage"></div>
			</form>
		</section>
	</main>

	<script>
		const form = document.getElementById('loginForm');
		const errorMessage = document.getElementById('errorMessage');
		const usernameInput = document.getElementById('username');
		const passwordInput = document.getElementById('password');

		form.addEventListener('submit', function (event) {
			event.preventDefault();

			const username = usernameInput.value.trim().toLowerCase();
			const password = passwordInput.value.trim();

			if (username === 'noa' && password === 'gasche') {
				window.location.href = 'pages/cv.html';
				return;
			}

			errorMessage.textContent = 'Die eingegebenen Anmeldedaten sind ungültig. Bitte versuchen Sie es erneut.';
			passwordInput.value = '';
			passwordInput.focus();
		});
	</script>
</body>
</html>
